front:
  text: 洞真太上說智慧消魔真經卷之五
  hash: sha256:f5cf86eeb8794b2d5dbce5aafa531ae914bf9058bb55145cb69b82fcb5623ad9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0153_HFL_005-001a, image: hfl/1032/1032-100.png}
body:
  text: 變化品太上告金闕帝君曰億兆有感感必有應惡是本有有而未極雖有微善善非妙善思惡惡應本有相趣也善是本無無而未有捨彼粗惡思此妙善妙善善應本無今起也本無是道道應唯善善有大小皆非惡也本有是俗俗應唯惡惡有大小皆非善也是以為惡者道雖救之劇迷者不回不回遂墮惡非智慧所可如何也為善者俗雖攻之堅正者不懷不懷遂成善是智慧所可營立也營立以一一生隂陽太和布氣含精養神神氣至妙無始無終無際無岸無頂無底無有中間無處無也有處皆有有不能知知者智慧無上之人也無上之人體此妙智而明守一施用不盈淵湛宗主迹應有分隨得多少故有巨細智慧焉何者智慧外名妙氣內實實自無離名有假合斂末歸本引僞還真真內無假應外有離離去復歸名有出入入為心神出為行業業有科法經教文言遵行布散施用依師始終無𧇊號曰功德功德成就由於五神肝魂肺魄脾志腎精心神相須了明無逆調和相順三一乃留留一統五六通在躬身神俱一入不二門心為行主行歸心神神通無二抱一不離一無洞空空處無極無不容無不有內實無名外稱智慧也智慧者標源攝流智者知歸慧者不惑不惑入定應感無遺纎善必祐有功必輔有德必興有因必果果此入定變化適冝知定不定解法不修修之無驗窮不能通空言而無實事非智慧也智慧建德立功遵方用術謹密精嚴存道依經從師取驗久而無徴更增篤勵練習無休自然有成方術雖多要在少許耳第一存道守一一道一心心無二想淨行無汙服符勑呪數氣躡步所修能專無不克驗驗成不久皆由未精精又精之其中有信信決如左愼勿妄宣也智慧上士習此三術消却魔怨誅除鬼賊制伏惡人禳辟凶氣除憂救病保免兵戎水火不能侵衆災不能犯逍遙三界之外遊宴王毋之家代見太平之君名入種民之録神仙進升皇階極級永與道合變化無窮是智慧之妙功衆聖之要訣矣金闕聖帝稽首奉行洞真太上說智慧消魔真經卷之五
