front:
  text: 洞真太上説智慧消魔真經卷之一內一
  hash: sha256:9b858418c68377ba1e96150e94ddf0eb2d18d146f7ed5058d7ccd46d9fa3f656
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0153_HFL_001-001a, image: hfl/1032/1032-004.png}
body:
  text: 真藥玄英髙靈品太上道君時説上清大智慧文消魔真藥玄英髙靈品敘金闕帝君曽侍座而聞之乃以告青童君曰此上清消魔智慧經中之所言也將可以逐邪起疾驅精除害散六天之鬼氣制萬妖之侵者誦此章乎實神虎之支幹真氣以祕用也上相脫可以告道士宿命先有真名者未學之時而為衆邪所乘在室之日而為鬼物所病者若能晝日誦之於房夜則之於心乃百邪逺爾使神開心朗矣青童君拜受所説以載於神符之篇焉玉清上清太極藥名猶足以却百鬼况服食其物乎九宫之仙莫見此書之篇目太極上真亦不傳智慧之大經也此經施於知空之學徒不授於地上之真名須道成升太極乃傳諸有受者耳今太上説鈔智慧之經中萬分之一言耳雖有真名於地上而未去學道旡緣盡聞之也是為此經不可備聞也聞其首題知其藥名也為有真命之名玉書上清也青童君伏受所説後以告赤松子赤松子學道未得之時乃於金華山中忽得疾病困篤經一十六年雖復思真存精而所苦不愈松子當此之時故自平心求道研神守靜𥘉不以困病為悲感以生死為視聽也所謂六天靈鬼以病亂真或上人教耶使疾但志欲壞真心視履水火正與不正也乃為病試者矣松子既清齋扶疾誦智慧諷消魔品三千遍則所疾都愈心開神朗有愈於未病之時也蓋夫病者一以試心誠二以下尸濁三以消不正四以練塵穢若平心堅向情志愈造求道守神希期玄教者則疾可須臾而散矣若惑疾亂心守勤不固情逰雜向誠存苟勉者則疾可終朝而考矣松子後於大霍山中道成上詣金闕受書為太虛真人是宿有真名於上清也智慧經一名太素洞經或名素慧傳凡有七卷藏於玉清之闕髙上虛皇丹房之裏矣常使素靈玉女三千人侍此七卷書也故或號曰太素洞經耳智者知日中之上皇也慧者宜以生生為急也慧字有兩生共併而共乘一急之象也有畫志者智慧經言也旡畫志者太上道君二相言耳當以次合盡誦之使三千過過數未足而中息皆更從一始若長齋正室注心誦畢皆當斷絶外物不得中息中息受拷於身玉童上剡三官奏聞於金闕也不可不愼學道者要當誦之使畢皆却邪朗神開心散愚除妖平氣真精入體者也先齋五十日乃當誦之掇手安祝令聲裁出口勿忽卒也勿速略也既究之後自得其妙其時靈人將有降告能解其旨亦飛行太虛太虛真人是也誦得萬遍乃佳也功畢之日雲車亦至矣此道大於三十九篇洞經而得猶減之者是智慧之鈔萬分之一故耳況盡看七卷之玄囿乎然四極科法不得傳地上學道未升天之真人如可修齋之日盡誦此一卷乃佳窮人自不能爾也在世間俗中開看神文自聽讀之不在故齋注心畢之數也亦宜先暫省令諳識條例然後乃齋誦之三千過為一畢二三千過為一至三三千過為一入四三千過為一朗鬱儀赤文為四朗應景散者也不可先已暫看巳諳既誦勿忽略而過此青童東科之大忌也使人眼失守光愼之常當安注視字徐徐而微言誦之若輟誤更却讀於止以還三十字清靜燒香漱口向東平旦為始如結璘黃章所謂溫之至道旦者也當誦經時聽三時食息也辰時午時酉時夜去至平旦矣若一畢事宜又未得即齋更誦者遲速自期不必相涉也一畢欲更讀者皆當更齋如𥘉洞臺內書刻鬱絶西山北絶石其文曰誘會有素娛端加講所精至道方朗豁智來溫慧經者也其文多聊旨書誦書之意也上清大智慧文消魔真藥玄英髙靈品敘太上道君所受髙上經也亦使人飛輪太空逐截六天之氣此經有七卷太上道君所寶祕也今青童君鈔撰消魔之章萬分之一厠雜於神符之前後也太上老君為太上大道君典領神虎太符金虎真符智慧素經告王君使傳知真者告青童使傳成真者夫知真者謂智真而得真成真者謂勤求而獲真者也此書唯使二君傳授於玄名玉書者他真人不得妄傳之矣是以太上故告於後聖金闕帝君金闕帝君以付上相上宰二君七百年內聽三傳先誓盟畢而行之不盟而視七世獲考於三隂水官三隂者五帝之三官也治罪人之死生矣第一左官治生人之罪第二右官治死人之罪第三女官治女人之罪又水火左右官左水官治妄言天地宣泄天文辱毀二象惡犯三辰者右火官治大逆殺生伐害師君反謀父母罪大丘山者也五府在岱宗之下太山之隂空洞之小天小天周回四千里盡置於三官也玄中有三太空有玉清太空有上清太空有太極太空玄中有三空洞亦然也夫太空者在太山之下空洞之上也夫空洞者在太空之下真人宫室之上也夫太清九宫亦有三太虛太虛者在太極空洞之下五嶽之虛中也太上説智慧太上老君侍太上大道君之左道君間居於愶晨靈觀崚增之室下籍九玄紫輝右衛有六領獅子巨獸於是太保真人簡生玉清神女房素執朱陵飛氣之香華捧要妙之幽章而立太上道君漱碧水吐絳氣虛心靜躬安神注玄乃左帶神虎右佩金真説吟智慧上經及靈藥消魔上章及八玄九真七扉三燭曰虛曰無上文玄郁千真停輪萬靈止足靈音上激志畫介福殊響逸奏洞金朗玉上監潛幽下煥筌伏玄範流秀神覽頴速道會無涯希韻幽覺飈氣延虛埃圯積域是以玄珠有悵怏之照清鑒激間寂之録大道逺備飛光遐灼動步靈溪驚浪素逸沈挺九冥難望解踵變不期蔚處不罔墨變化翹陽希栖德景恬愈雙門反悟理幾鎮朴大象振群廣河冥洞玄通理妙接微遨玩神刀泛澄大塊激百陽以生電鼓千隂以吐威六天失氣九魔消摧握日廣霞萬煙入懷靜與天地合契動與七景齊暉寢安弗安處危弗危映徹波煙拘真放栖協晨則二絶交和眄目則萬冥自開於是足排七度手秉天機巔蓋玄辰合還二儀河山為之崩決四氣為之流移億堅明石迅耳豁頽周落靈度廓一玄歸則神全虛使妙韻玄飛者必能動太空於無旋生群風於潛頴舉八景以上升抗飛轡於清領逸鳳車以髙觀放雲軿以流騁歡九遐以濟豁凌紫天而停朱景樂七源以通氣冠碧津而注絳井飈煙浪電與妙體挺澄空神欽靈梯絶永矣朱光已煥歧入玄河戢翼觀化逸尚虛羅萬殊總映飛輪玉阿鸞嘯龍躍虎嘷鳳歌萬響瓊散衆玉亂葩琅林振風絳木踊華爾乃激和萬音飛鳴千律靈範既舒雲鄰顯質弘化晨流竒術夕出解帶逰神擁膝蕭粹觀化不藻平玄不蔚挺關空流蕭任瑩薈七朗永時不遺不貴逍蕩寒靈無獨無對欽託神條行歌冥惠攫天備肝獅子鎮胇焦火衛魂銅頭齊魄長牙奮耳以逆躍電父激氣以雙趹揭齒斂足雷公礚捺六眗營贍五虎詬沸銜刀逐邪猛獸驅穢奔氣雷精保生莫墜然此靈禽始由人動道亦濟生凌峯凝神振披峥嶸九凶遣難不思不情均合八象器玄氣輕重霄七眄垂芳秀英朱黃炎萃非煙煥靈陶運合真灑朴散名漱味靈翰神氣平清任浪二天髙芳馨冥玉女執香紫妃抱罌灌津霄池散華玉庭檄命甲騎族攝天丁毒龍吐隂神虎出兵外纒玄氣內備七城道未降合慿威而生真成齊德元氣玄并是故玉清霄真心無空岸髙栖絶冥抱丹雲澗爰及上道之士含章自粲逮于上德之士獨味冥散玄不期真標不啓煥頡頑大道濠川之畔沖起應時希微常韻飛弦逺逸音不待彈九和玄響空同至宴故能心絶於天外妙同於一觀也自此以下皆龍曜四澤發精幽仙遊夢玉清託景上間浪映升虛手排八千身振紫䇿巾朱冠蓮晃照七谷飛芳漱煙精徹太虛德功九天併日戴月恬栖浩篇飛輪北丘解帶華園西毋命轡參乘龜山四攄大惠妙詠太玄六隂美驕來修昔緣自德致不遐心未悟真者皆加以琅玕鬱華七陽日嬰九琳之液八瓊之精四蘂紫漿五珠絳生三華飛剛雙珠月明蘭酒金𥹋甘露玉瓶青建弱羅漂芝流靈神渠丹散玄柯連縈琅根朝結西皇素盈可以衝躍朱霄飛虛玉清呼而吸之以至真靈漱而變之以入紫庭亦可以東極織女之水亦可以西盡長庚虞汧亦可以南窮陽光之根亦可以北測太隂夜城於是朱夏凝陽景飈逺翔太虛拔精二象佪光八道調和乘穆運芳化理九絶德暢玉皇窈窕三關神軒四張慶雲霄搆六度休祥靈風散魔法鼓徴兵遊汜濯津洗之滄浪練魂化魄俱會道場掇清把蕭和氣保長服啓華頴惠讃外融下挹玄流仰排空同矣未學少玩道宗昔因德舉位為仙皇飛落脫世上遊空同鱗遊冥津振地天江朝夕衆仙下幾存亡耳忽聞玉清之上道窮真之玄岸志慕首仰坐以待旦我獨何辜耽此小宴何可長染風塵終為上皇所抃粲者乎於是乃置棄仙章解冠曩世雖復體和紛林然心栖象外髣佛髙秀希音玉籟爾乃遂辭榮散華振䇿崇嶺咀嚼元氣吸引二景抗翅鴻征極神測挺寂胃虛中斂氣傾鼎殊荏守玄彌春閉靜淡身自喪尸不束整放形存空旡執無秉矣遂啓洞門於希林尋靈迹於丹穴發九天之朱匱望上清之瓊札玄書既刻於玉章絳名始刋於虛闕周遊五嶽萬巖畢至百岫千峯莫不履比一瞻玉升於紫清之雲再覩神文於錦雲之笈四遇三元於玄臺六造五老於靈室為太帝攜持有九厠髙上同輦者七於是天扉廓散素徹朗幽延輪回軒髙會上朝羽襡錦帔流鈴鳴簫龍冠鳳裙隨雲逍遙冥漠齊晨心洞體遼乃覺我往醫足虬藏今起似鸞飈是時實自足自娛長宴紫宇矣通玄測極向空尤難然後知道妙靈觀有纍千之塗矣足生齊全玄心壁往然後知求心之定足生之幸矣是故宗之者衆極之者寡矣然正用無堅之心以上向玉真之感又須旡難之往以上求至生之固亦必獲玉映以齊照終成帝皇之延容也蕩則萬萬而不冀專則有冀而萬來矣諸有外情之徒欲栖生之夫聞道而膝行道寂則俱亡向山而兩足酸寒涉川而三血波戰五體交攻於未墜之谷一身驚劇於死生之岸者適足盡天年之勞苦為聲名之外規耳要皆由心散不一情蕩不固漸競日滋渾不自覺壞正喪志迷夢道林故矣安可以告至道哉今將告子靈真絶術天仙之方大度祕要長存上經也若欲白日升天北詣玉皇䇿龍飛景宫館上清倒擲瓊輪巔回五辰合日揚光入月徹明者當得玉清隱書佩神金虎符鬱儀赤文招日同輿結璘黃章與月共居洞真玄經五辰合遊大洞真經七世散仇三十九章七祖仙天黃老八道九真神書上逯靈書紫文魂魄錬拘金闕作紀五老寶籙玉庭百芝上清精藥玉清智慧經中鈔言乃曰六淳發榮玄光八角風實雲子帝坦玉闥金敷莢英廣天黃木昌城玉蘂夜山火玉逯乃鳳林鳴酢西瑶瓊酒中華紫蜜北陵緑阜絳津金髓月精日夀朱河琅子蓬山文醜濯水七莖崩嶽電桞北採玄郭之綺䓤仰漱雲水之朱蜜夜牛伏骨神吾黃𣾰空同靈瓜四劫一實冥城麟膽炎山夜日東掇扶桑之丹椹俯探長淵之立藻上和九轉之飛玉下咽青玄霞之寶太虛結鐶素女懷抱紫虬童子九色鳳腦太極隱芝絳樹日道太上虹李天漢大草南宫巨珠西鄉扶老三梁龍華靈妃所討有得食之後天而老此玉清之所服太上之所寶可以上飛景霄分晨億道守鎮皇精朝注九腦也然斯道至大妙靈映邈非血食肉人所得備悉但聞玄音以散濁聽風氣而逐穢矣上可浮絶泰素下可以禳妖豁疾自非德響根神孰能併流於靈逸哉故上消魔以理氣於萬通故上真藥名以育神而棄邪信哉斯言其次上清幽芝太上九時有八光太和斑龍黑胎文虎白沫出于西丘七玄飛節九孔瓊珠雲漿琳酒玄圃琅膄鐘山白膠金生青敷閬風石腦黑河珊瑚蒙山白鳳玉胇靈丘蒼鸞金血東英朱葉九節交結太微紫麻瓊華玉實流淵鯨珠赤河絳壁北汲太極之井中掇文朱之脈雲庭神桃昆園平雀夜精日草青津碧荻真宫鬱壇玄都三蓋左服玉童之光右挹玉女之氣上招神元下飲玄瀨仰握蘭圃之瓊精俯擲圎丘之紫捺白水靈蛤八天赤薤萬載一生流光九隊有得食之後天而逝此天帝之所服太上之寶貴非太極之所聞中真之所逮誦其章可以竒流永生諷其名可以起疾斬精蓋夫智慧之章消魔之經極鈔於妙象也靈芝上藥真皇清辭亦粗激於道目中矣佩符帶真口誦九素庶足測衆魔之情乎體元承氣朝研玉玄當守之以萬椿之外耳四魂九魄乃遂交生於一身之用用之殆足樂也其次太極之品四真常珍乃曰九石錬煙丹液玉滋荀首流珠琳華石精丹爐金液紫華虹英太清九轉五雲之漿玄霜降雪騰躍三黃東嬴白香滄浪青錢髙丘餘糧積石飛田太虛還丹太秦玄堅長光流草雲童飛千亦能使上飛輕舉起體霄冥矣此天仙之所服飛神之所研非陸遊之所聞山客之所見也又當知九化十變隱地八術然後乃能廣遊玄空倒步天阿乘雲駕龍凌騰無方矣其次又有三十六芝飛爐煉煙陽水月華五石之腴填生五藏煉貌易軀及瑰葩雲屑金粉玉柔亦能延年益夀可至萬歲也其次又有玄水雲華之漿五黃鬱靈中精千石瓊飲衆青朱英白車飛節之實流馬紫木之黃一服立使人長算千紀日服日延年隨藥進命與藥遷亦旡窮之靈物不死之竒方也夫長算千紀時謂服但一刀圭而巳耳畢其下藥先有松柏隂脂山薑伏神昌蒲門冬巨勝黃精菊花苟𣏌崖蜜茯苓桃皮澤瀉葳㽔黃連升麻地黃赤板朱英雲飛水桂衆物之精其類繁多略舉一端服之為能小益不能永申髙可七百年下可三四百歲恐不辨長享無期上升青天也亦能身生光澤還白童顔役使千神得為地仙陸行五嶽遊浪名山故不自辟其必死也又漸求上藥以自改新則易為階級之進何必守故而不遷取期限以沒齒乎然此等道冝柔弱溫仁至心一意潔體清淨調和五藏安形念景存保百神守魂煉魄除蕩滓遊心重玄情無流華之欲抱一獨往懷無嬰塵之纍薰辛五辣不近於口肥滋血味不經於腸山居空處不營外事乃上可以耽玄存真召神符靈不可以餌食八石呼吸液津也夫隂丹內御房中之術黃道赤氣交接之益七九朝精吐納之要六一回丹雌雄之法雖獲仙名而上清不以比德雖均致化而太上不以為貴此穢仙濁真固不得窺乎玉闥矣且嶮巇履氷多見倒車之敗縱有全者臭亂之地仙耳想訪擬髙範不足絓意而注營乎近不及導引服氣之法胎息閉心存念之術幽神中篇金匱隱旨黃庭內外太清守記凡如此道數千餘事皆流傳俗間兆所知聞自中世以來軒轅之後以此諸道而登度者人以嶽積不可勝數此勤心至矣守精篤矣秉操堅矣志向定矣行此四德余將為兆破魔升仙也至於不固之人有為之者或彌年歷紀不得其益何也或服引呼吸不得其理或為他物所惑將成而敗或暫得其益遇疾則止或師將告之而不知别或心不能專精神紛錯或積罪作咎以犯天忌或虛增經方以意損益凡如此者往往相尋此皆浮華之人傲穢之士為有虛言不可教也故使大道不匝於天下真仙希遊於世間皆人之深責非吾黨之咎纍矣夫訣在平淡無營內視八道數神垂魂不苟不保灰塵九魂抱一遊冥五藏莫放液氣玄凝臨死生而不畏對竒怪而不傾縱天形於空同斂神和而守精於是大試於何而起妖罔從何而生金石不能比其大質八流不能敵其淵停澄正之才實由天生亦可學而速獲亦可不求而成矣格而言之仙非強可求真非干可營自無玄籍自不得聞智慧之經自旡玉書終不見吾神金虎章自非勤慕飛仙不得知太極上清揔而言之分也志也精也勤也行隂德也救災厄也慧窮困也立仁功也都而統之慈心以對萬物勿行凶心以向萬生道要之門户矣獲道之曲室也子勤誦而思上靈將告子難通之辭或心開而解宗朗神而真來萬鬼走迸篤病不治妖注竄伏疾愈即時實賴神虎以威六天亦由智慧御消魔之醫也百絙解脫心炳神康六和長安七精開朗衆羅逺縱不存不亡大哉上真太上元功諷及於此上拜四方大以尊我神文黃道大章矣若誦經未滿三千遍而中止者又當更齋誦之三千遍不得䛀前為數也洞真太上説智慧消魔真經卷之一
