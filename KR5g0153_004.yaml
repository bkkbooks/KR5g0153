front:
  text: 洞真太上說智慧消魔真經卷之四內四
  hash: sha256:5849265df041fab73226b417f27dbe4fc3ab5176399065b5d4a48068914257f0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0153_HFL_004-001a, image: hfl/1032/1032-084.png}
body:
  text: 證聖品太上告青童君曰衆聖積功因緣致果果極證備妙姿絶倫救度三十六天故得三十六相生成八十一品故得八十一好一切大感共覩具形小感篇應各現多少少現多藏凡不能覺是以衆聖真體無定質定有常無增無減知之者希故為獨貴然志學之士通照雖未圎周至於所見隨識覿竒識眉眼者矚眉眼特異識鼻口者覺鼻口超殊如是三十有六各隨識明明極識遍乃具朗焉一切含氣同少異多多無鞅數少極乎一一未可至此同路遐方須治練練多還少少未至一尚有三十六階階為一天有一巨異巨異為一天之極極三十六者乃㑹一源是以㑹之之方各立科術法迹參差或同或異異同之根以善為本本一分應成三十六三氣三界備在其中色通其外外得忘言得之三十有六三十六天各有其一絶勝之相太上備有諸天天人真人仙人聖人神人各有多少諸世間人帝王公侯至于凡庶又各有多少富貴而夭貧賤而壽無家宅宇而有師君有宫苐舍而無資待或多財寶不事衣冠或豐飭味不營屋室乃至樹下草菴名聞髙顯或華堂麗菀以振芳風又有瓊臺無道石户有德參差億緒勝負萬端上有下事下有上業因緣不同修行各異不得相非非則傷識識神全通通在五德德五能備諸迹可忘忘迹而迹存自然相好具足三十六則貴富才明威嚴光彩超衆絶倫宫宇城邑寶蓋床帷香花伎樂侍衛參羅文武羽翼幢鼓髙宏風雲清和動靜相附日月炎光萬色衣冕百和滋味身口豐盈須與不須適意自在無上真人太一元君積學習善究竟得斯斯未得者轉輪生死死生苦樂一有一無識不能通滯則失倫倫失墮惡未有還期期還向善是今學人各精自揆何有何無求其所無不滯所有有能贍物無則自臻凡有錢財而無才解冝行布施不生吝心輕財貴道才解日新若有宅宇而無康寧冝納賢聖舍住真仙心無悔惜憂患自消若有衣食而無長年冝減身割口供養明師尋永竒方修習妙術心不懈怠必保延生若有才智而無居糧冝藏明內觀密化後生開導一切不名其功謙退晦迹心不懷疑神明所護人鬼所崇自得廣宇天宫福堂衣食靈異侍衛鮮華凡如此類以推衆事事自現彰不復具記明者得之捨有而求無無不必得得無在無滯無滯在不拘彼求則與無固執焉此為無滯非為捨也彼雖不求有之勞慮弃避與他是名為捨非無滯也捨此與彼滯此之元尚非道也又求而與之我雖不執彼得成災此粗不滯亦非道也道不滯妙妙者照明我捨無損彼得有益是名為道智慧人也施與多方冝與不冝得冝者是智慧失冝者是愚癡癡在雖施乖智慧也又物來求我詳量實虛虛者試我也實者憑我也憑者有善惡試者有精粗粗試者破而摧之精試者辭而謝之謝之者聖師善神以事試我我無妙德德未備充致試今來精識意趣巳知已了無復惑心以此辭之是為智慧摧之者五魔三毒變化試之未明吾術未信吾威於是治之誅責制伏使之歸降能勝魔怨是名智慧被試驚怖𢕔徨迷惑是為不度非智慧人非智惠人陷入魔黨能悟邪群自拔得出出邪還正正心誓志堅無退轉譽來不喜毀至不愁解之有方消之有法直置毀譽無屑中懷修行正法道德無懈毀譽自弭是智慧也彼來加犯犯不校計可言言正不可則巳默識神道潜捐犯加加犯自歇無生報之心心不懷報道德日隆惡徒惡之不能中傷反自受弊乃更悲之哀念愚頑不得逞快用心若此是智慧也一切凶人反逆無狀詰道誚德呵天罵地毀辱父毋誹謗師君嫉妬親友讒賊善人有能容忍受枉不瞋解喻不巳恭順不諍全道在心是為智慧若憤激自明申直伐枉損彼利巳或殺身取名或不顧身各肆其忿意死而無悔或更增感結非智慧也凡一切惡人凶禽毒獸蟲鳥螫蠆皆應防之防之無術術淺不攘先對既深今功德淺報來必至至不忘道知是宿罪所招不怨今日之苦念與仇對解釋因緣不生惡意強梁加之然其𥘉來輕重未測先設方法說喻呪願種種釋之務令兩不相傷縱復刀杖恐愶使退必無殺害重增怨讎力設方術不能郤之分受毀壞以酬宿對不起報彼之心存道求後永免此為智慧凡聰明而貧賤暗塞而富貴仁慈而短祚諂害而長年無罪而罹禍有舋而逸遊皆各報對毫分無差明通者了昧滯者疑疑不能遣遣不求非智慧也智慧者無疑無疑者有識識三十六天地明三十六妙行吟三十六真音群魔滅爽矣三尸極凶謂為三毒毒害人命急宜除之守一精專三尸自滅一無形象無欲無為求之難得守之易失失由識暗不能進明貪欲滯心致招衰老得喜失瞋致招疾病迷者不攺致招死殁殞瞋及老三尸所延治救保全唯先守一非一不濟非一不成守一恬惔夷心寂求損欲抑德反迷入正廓然無為與一為一此為上上之人先身積極所致也中中以上先善未積積而未極皆由漸升當存三元諦識神氣狀貌名字出入有無主鎮三宫三尸必落三元又妙非可即弘當勤行善五德備修萬善日積千魔敢干尸毒既去練暗成明智慧神通長生不死聖真神仙隨因受果升玄化世順運去來自測測人觀身觀物皆有證驗精詳察之有非即改悔有是即堅行齊靜存思服佩藥符章表懴願疑實無虛無貪無欲不衰不老老反童嬰身神光澤無喜無嗔不病不厄厄度病除氣力强盛無迷無嫉不死不亡亡殁不殁正見無邪自通通人與道為一一合一也號聖真仙欲不能寡衰不能攘嗔不能遣病不能差愚不能移死不能免空稱學道皆虛妄也虛妄之徒終陷魔黨致使世境有詐稱假名或號太上或名聖真矯託神仙亂惑一切自非實學孰能正之化邪保正守一明三行五備六六通之人無有假僞動靜皆真雖有權化終用真道真道之業不哀不病不死長生教訓不倦古今典籍過目即諳照其真僞了其抑揚明其漏誤洞其精粗治定解說朗然釋疑施經運用肅然有驗吐言無瑕出文無纍清談動天敷文曜日落筆成章序讃玄極或經或傳或戒或律或偈或頌或劵或疏或辭或牒或章或表或懴或願或訣或符或記或録或少或多或繁或簡或素或華或文或質或淺或深隨方設教行藏不同出沒舛異隱顯之殊或先乖後㑹或前合後離離惡合善善為道基發言著章有離有易有澀有利宛直各宜一通之人百字不治二通之人千言不攺三通之人萬字不玄四通之人十萬不易五通之人百萬不拘六通之人千萬不㸃自此以外應變無窮非斯六人不可製作乃得撰集效述古先皆應證引前聖謨誥慎勿率巳𦚾臆而言縱言巳心心未通逹不入正法皆謂邪文少時自滅不久宣行唯彼六人流布無窮或隱或顯終不滅亡後學之儔精研此㫖覺未同六莫強著書徒勞心力人鬼所嗤得罪玄靈方罹重栲風刀痛惱歷劫無原勿尚虛名輕脫妄作妄作者凶明各加愼凡有益無益之為有利無利之為為為無為為為非我我為非我我為為物為為為物有為非為非為之為為無為也為無為者怨謗不生生不傷巳彼自招災災加於彼痛之悲之念之祐之不快不縱不縱不快救之盡方方不能濟濟非彼堪此自常吉彼自陷凶陷凶非此此吉不求不求自至自至非凶自然是吉不知此吉非智慧人人嗔忿我我嗔忿之縱不報忿而不防間坐彼罪深貽此禍重重禍尋來來不覺知暗任為通災延不測未能免之非智慧也自能能教人教人能益已益人益勿益益無益無曰損損僞益真真人教人不私在巳巳善善人人善同已巳人同善善練入真真道成就毀辱不來來不為害判無所疑疑非智慧流言謗讟不反不覆方便解釋恱而不嗔彼我欣然疑誚雲散任性自是不顧祛他雖㑹中直未能兼弘偏美有傷非智慧也非智慧者魔試日干無由得三十六芝無緣果三十六相不能生八十一好衆魔不可得消威神未得具足道場不可妄登登道消魔先定智慧矣青童稽首拜受奉行洞真太上說智慧消魔真經卷之四
