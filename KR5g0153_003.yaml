front:
  text: 洞眞太上說智慧消魔眞經卷之三内三
  hash: sha256:671798d7072a45cbae340ea612168f5aaf73c18b880feade53e5505595bb90a4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0153_HFL_003-001a, image: hfl/1032/1032-054.png}
body:
  text: 守一品太上告金闕帝君曰凡夫勇猛能從科戒制伏心形積功累德永成大聖要由守一一本无形而能感應感至須形隨因見果一有一无无窮无極无勞无損无減无増无咎无累无死无生无生常生常生无死无死之生生生一切一切禀生資此无死无死能生生成无數守之者智慧弃之者愚癡愚癡致死而智慧保生生生可貴一切所欣欣生惡死含炁所共而求生者不生畏死者促死死生不得其道是以乖於所期不乖所期決在智慧智慧先起起知有一一者生炁炁生相生不得忘遺不得壅遏遏炁求生生炁斷絶絶即爲死死未由生冥冥長苦識者悟之悟之不早是名无知无知䧟愚下愚下難化化而不知知而不勤勤而不能乆乆而不能精精而漏泄是名无斷无斷墮癡癡劇不改非智慧也智慧者改迷入道捨邪還正守其生炁炁生相生生炁變化離合成三一曰始元也二曰元洞也三曰玄空也下曰玄炁玄炁主空救疾消灾乘空可也中曰元炁元炁主洞延年不死除礙可也上曰始炁始炁主元相生不絶妙有可也妙有兼三元洞空也有未能兼習空習洞習洞者修德益筭延年獨則抑想偶則不施存身爲本接物爲末本末一名爲慧也習空者立功教化救贍偶則施人獨則篤己濟物爲前成身在後後前尚二名爲智耳習元者修德立功一動一静物我兼濟一後一先隨時不失一凝一施生巳生子生身生人人神通暢名智慧也智慧之炁炁極道源源本无名強號曰始始炁之先以生爲急急生者生物而我常生生生者不絶爲道種疾愈灾消加笇无極恩被无窮故一炁最妙學者不知非智慧也知此一者即是始一能兼三事故稱元一次曰玄一總謂三一三一之中三事各異異而行之功德有深淺混而同㑹名號極宗源源一之妙不増不減不死不生而生生死極故最髙最尊獨立不改而生生之人須隂陽配對一炁諦識相生兩半成一一生三焉孜孜相傳无窮巳焉謂之志志此一源不得相滯耽色逞情弃醜逐妍浮華失素嫉妬諍奪非智慧也智慧者少𥝠寡欲欲淨而不著欲爲而不諍若欲專而略他欲此而忌彼欲共而爭先欲先而重望欲己有而願他无欲己妍而願他醜己得欲速許他欲遲㑹泥不悛離憶不遣思念我狂違經破法不顧人神之責不計罪苦之來來不知改非智慧也智慧者守一諦定心源心源習俗定道難弘先當服符精宻即驗右十六符始於八節日朱書竹膜上平旦向王吞之再拜拜畢呪願隨意十六日止又朱書白素盛以錦囊綴頭上五年眞一相見右三符朱書素佩左肘女右八年三一俱見又正月旦青書白紙一符北向再拜吞之後以金長九寸廣四寸厚三分刻書以封山川之邪神掌五嶽之眞精也服佩符後諦存三一兩眉間上却入一寸爲明堂二寸爲洞房三寸爲上丹田號泥丸宫方一寸紫炁衝天中有日象圎九寸外照九萬里我形變化大小蹔儵欻忘身在意存之上元赤子居泥丸宫華盖下諱玄凝天字三元先一名伯元上一名伯史華位爲泥丸天帝君右有帝卿諱肇勒精字中玄一名起非一名常扶二人祼身貌如嬰兒心爲中丹田號絳宫方一寸朱煙叅天中有日象徑七寸外照七萬里我形變化中元眞人諱神運珠字子南丹一名生伯一名史雲拘位爲絳宫丹皇右有輔皇卿諱中光堅字四化靈一名幽車伯一名重史華二人祼形貌如嬰兒坐相向臍下三寸爲命門丹田宫方一寸白炁衝天中有日象圎五寸外照五萬里我形變化下元嬰兒諱始明精字元陽昌一名嬰兒胎一名伯史原位爲黄庭元王右有保鎮弼卿諱歸上明字谷下玄一名奉申伯一名承光生二人祼身貌如嬰兒坐相向存憶三一積乆見之見之神通成智惠也學智惠者存一未精一未降現神未周通猶有灾厄事有未明雖得其法未保其生而自知自可鄙𥬇他人他人所能愚人所解謂爲无竒而不留意意旣不存遂不能解解雖非要要亦用之用之和光愚難智易棄絶不爲爲而不是不足同塵不能有濟非智惠也凡數術工巧慱弈倡娱男女鬼神妍醜雜方身口心事聲色觸干動静𨼆顯變幻浮沉有无權實或正或邪强弱凶言一切云爲有一不通非智惠也學智惠者抱一勿離離一失乎智惠皆由三彭所爲上彭役乎魂魄貪淫致老中彭役乎識神所以嗔恚致病下彭役乎精志所以愚癡致死死歸鬼伍號之曰尸尸鬼之苦三彭是爲故號三彭憉悙縱横難制伏也不能制之身神煩惱傷裂毀壞幽淪風刀荼毒痛楚長夜可悲塵劫无巳可不畏哉智慧之人先治三鬼禁止貪滛不得滯諍抑忍嗔恚不至訟闘闘止諍息罪不及死死者由滯滯者爲癡諍闘相觸極心逞力不知止退至死嬰殃殃考酷毒悔无所追是以修學要先抱一抱一存神衆事无滯爲而无爲日損成德貪滛蹔有有能改悛嗔恚時起起即抑之抑之改之終免滯方免滯方者不死長生蹔貪滛恚易著難祛祛貪可易滛恚彌難一切含識莫不願勝彼來加我意所不堪不堪則報諍闘遂興興易止難故致死敗誓心尊道守一不離巳无犯於人乃易无使人犯巳又難犯而不校志不報讎報讎以道更加開度解釋怨仇同入眞正不起恨心永同源一乖此術者非智慧也智慧上人以已率物太上下知文言成教教者所吟七章如左一知一不守守之不堅堅不能乆非智慧也二知三不治治之不嚴嚴不能永非智慧也三知凶不避避不能宻宻不能常非智慧也四知言不親親不能奬奬不能成非智慧也五知俗可治治不能定定不能興非智慧也六知道可行行不能明明不能盛非智慧也七知无知有有不能精精不能審非智慧也右七覺七吟自然文字昔者太上及今吾身將來登極皆吟此文消諸魔試滅衆邪疑疑去迷除迴末歸本本難即至未者共營一懃一怠功過推移徃返之間逢隨即至須應須感感以動之開悟愚闇闇者得明明還正覺覺一切无无中有妙妙炁變化練僞成眞眞由五德德㑹六通通資七覺覺縁此吟吟應彼感感顯生名名之爲應承因入果有證有徴无差无忒七五中六六變相成彼感尚徴動之令著迹由我感我有感名名異實同徴著爲異異乎寂動對岸𥘉分分一爲二三生六成成六六迹六迹一心心源本一流𣲖无窮大分有六出没所關行之出三界之上廢之入九幽之下智惠行六能超三界度九幽苦故名六度六六三十六天咸共修行六度一曰能懃行善不𢢣也二曰能信篤道无忘也三曰能雌守一用柔也四曰能終如始无敗也五曰能諌諍止惡不忤物我俱全也六曰能棄酒色和光通神同塵種道无昬无滯是智慧也是智慧也者清明爲常祭酒不昏不冥不滯通神濟衆係道種人有而不亂故名爲弃弃在无滯滯在違科違科則昏迷非智慧也習學之儔存神慕德未能无待省約示廉遵崇曰損表廉神明供養賢德申已至誠依按法制不得滂沲酒爲水糓之精善能宣通氣液節之者接靈益性縱之者乖神損生耽湎致旡非智惠也源一自然玄二成象兩炁流潤和合三三三一周布聖普同年盛德充盈兩半生生兩半成一一一无窮弃德好色不顧種人恣欲逞情非智慧也智慧之流知日偃月皇靈所崇生生爲急自弘及物傳化不休愼勿乖此二炁失和或隂隂相結或陽陽相纒或男多聚女或女饒集男貴賤混雜道俗紛紜妬忌忿懟隔絶爲髙致斷種滅胤墮落不毛求還未期悔所旡及或男耽羙女女戀華男交非妻妾合非婿夫姧邪亂正生殺乖眞不能改悟非智慧也智慧清明不邪不亂故登三清玉京紫極極道之源由清所詣也一切含炁无能无欲欲有深淺事有重輕輕者相觸不止則重巳无犯人人犯必受受有怨言言不能釋非智慧也若尊卑内外有相犯觸和顔恱色譬喻解說流泣悲酸呵罵嗋嚇種種方便趣令得止思惟權實一引一抑勿致憤激小更成大遂不止者宿命惡深聖所未知慈念勿責宻愧不能止之愼莫出口敞靈智惠有所无柰何正是此等又不得過自耻恨弃彼不復存之或不戒視敗任人縱横无慈救功非智慧也智惠者守静存神忘形定炁炁通无諍諍可止也忘形神存諌多從也若忘神存形利我割彼彼不信從反加憾恨乆後成殃非智慧也凡有所爲爲道是始衆事云云皆爲麄未麄未可捨妙始叵乖乖妙逐麄非智慧也智慧者發心動口動靜其身行道爲始始善善終終不違始練心日精善行精進功德惟新不能爾者非智慧也凡立身心同口思道抱一統萬習弱尊柔江海多容故爲川王能忍辱者受垢成主不堪困苦不辨臧非不任煩惱非智慧也智慧者无壞二相物我同一是非不足論論之不苟執苦樂不須辯辯之不用申行善不自伐受謗不自陳心殊此者非智慧也凡生受生生生最貴貴道重經崇師相係此爲三寳寳真无價三不可偏偏則泥滯周則圎通通則濟衆衆濟由乎三尊尊體成一一三應感有𨼆有顯有嘿有語有交有言道寳无形隱爲化本經有文字顯爲教端師有形言出䖏爲法語嘿隨時長存爲最最要之訓度无量人敬信三寳存篤无忘齋醮招神持戒行道謹慎不𧇊全而无破破𧇊即首攺徃修來不重犯者必得度世不信不持不攺不悔不能度世非智慧也凡聞大道誓能懃行行善不休損巳濟物有文武才者以識解施人有勇炁力者以執勞施人有勢位財者以榮禄施人无此三者以善心施人見他佳事助之懽憘見他避事助之愁憂於彼雖无即益縁感乆乆相關彼有善人賛祐之福巳受善心隨憘之報報同布施増長不休積積无𧇊自然有才力勢位也无此四施非智慧也智慧者行此四事爲六度之先學空不空爲聖證之極極不空空不不空空空洞元矣无有有焉有有不有无无不无无无精麄有有善惡有无善惡无有精麄有无相生精麄相形不能究竟非智慧者了然淨明明而不耀用行捨藏凡不能測正心治身檢口守寂三業无違道足神具沈浮自在髙舉六通號爲梵行行髙於俗去地昇乎天六度冠梵行七覺登大羅非下聖中真所可䟦及次仙賢者豈能逮哉至於小智大迷小惠大惑執无著有彼此相傷邪來干試不度不知遂䧟退方非智慧也智慧賢者精進進功功德超殊亦得上合合則魔消宜須勇猛後身先逹子諦宣之金闕帝君稽首奉行洞真太上說智慧消魔真經卷之三
