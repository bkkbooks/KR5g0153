front:
  text: 洞眞太上說智慧消魔眞經卷之四内四
  hash: sha256:c6ff572813b3da894484556ca54cf3ee58fe9a6c46ae8594689273208911b211
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0153_HFL_004-001a, image: hfl/1032/1032-084.png}
body:
  text: 證聖品太上告青童君曰衆聖積功因縁致果果極證備妙姿絶倫救度三十六天故得三十六相生成八十一品故得八十一好一切大感共覩具形小感篇應各現多少少現多藏凡不能覺是以衆聖真體无定質定有常无増无減知之者希故爲獨貴然志學之士通照雖未圎周至於所見隨識覿竒識眉眼者矚眉眼特異識鼻口者覺鼻口超殊如是三十有六各隨識明明極識遍乃具朗焉一切含炁同少異多多无鞅數少極乎一一未可至此同路遐方須治練練多還少少未至一尚有三十六階階爲一天有一巨異巨異爲一天之極極三十六者乃㑹一源是以㑹之之方各立科術法迹參差或同或異異同之根以善爲本本一分應成三十六三炁三界備在其中色通其外外得忘言得之三十有六三十六天各有其一絶勝之相太上備有諸天天人真人仙人聖人神人各有多少諸世間人帝王公侯至于凡庻又各有多少富貴而夭貧賤而壽无家宅宇而有師君有宫苐舎而无資待或多財寳不事衣冠或豐飭味不營屋室乃至樹下草菴名聞髙顯或華堂麗菀以振芳風又有瓊臺无道石户有德參差億緒勝負萬端上有下事下有上業因縁不同修行各異不得相非非則傷識識神全通通在五德德五能備諸迹可忘忘迹而迹存自然相好具足三十六則貴富才明威嚴光彩超衆絶倫宫宇城邑寳蓋床帷香花伎樂侍衛參羅文武羽翼幢皷髙宏風雲清和動靜相附日月炎光萬色衣冕百和滋味身口豐盈須與不須適意自在无上真人太一元君積學習善究竟得斯斯未得者轉輪生死死生苦樂一有一无識不能通滯則失倫倫失堕惡未有還期期還向善是今學人各精自揆何有何无求其所无不滯所有有能贍物无則自臻凡有錢財而无才解冝行布施不生恡心輕財貴道才解日新若有宅宇而无康寧冝納賢聖舎住真仙心无悔惜憂患自消若有衣食而无長年冝減身割口供養明師㝷永竒方修習妙術心不懈怠必保延生若有才智而无居粮冝藏明内觀宻化後生開導一切不名其功謙退晦迹心不懷疑神明所䕶人鬼所崇自得廣宇天宫福堂衣食靈異侍衛鮮華凡如此𩔗以推衆事事自現彰不復具記明者得之捨有而求无无不必得得无在无滯无滯在不拘彼求則與无固執焉此爲无滯非爲捨也彼雖不求有之勞慮弃避與他是名爲捨非无滯也捨此與彼滯此之元尚非道也又求而與之我雖不執彼得成災此麄不滯亦非道也道不滯妙妙者照明我捨无損彼得有益是名爲道智慧人也施與多方冝與不冝得冝者是智慧失冝者是愚癡癡在雖施乖智慧也又物來求我詳量實虚虚者試我也實者憑我也憑者有善惡試者有精麄麄試者破而摧之精試者辭而謝之謝之者聖師善神以事試我我无妙德德未備充致試今來精識意趣巳知已了无復惑心以此辭之是爲智慧摧之者五魔三毒變化試之未明吾術未信吾威於是治之誅責制伏使之歸降能勝魔怨是名智慧被試驚怖𢕔徨迷惑是爲不度非智慧人非智惠人䧟入魔黨能悟邪群自㧞得出出邪還正正心誓志堅无退轉譽來不喜毀至不愁觧之有方消之有法直置毀譽无屑中懷修行正法道德无懈毀譽自弭是智慧也彼來加犯犯不校計可言言正不可則巳嘿識神道潜捐犯加加犯自歇无生報之心心不懷報道德日隆惡徒惡之不能中傷反自受弊乃更悲之哀念愚頑不得逞快用心若此是智慧也一切凶人反逆无狀詰道誚徳呵天罵地毀辱父毋誹謗師君嫉妬親友䜛賊善人有能容忍受枉不瞋解喻不巳恭順不諍全道在心是爲智慧若憤激自明申直伐枉損彼利巳或殺身取名或不顧身各肆其忿意死而无悔或更増感結非智慧也凡一切惡人凶禽毒獸蟲鳥螫蠆皆應防之防之无術術淺不攘先對旣深今功德淺報來必至至不忘道知是宿罪所招不怨今日之苦念與仇對解釋因縁不生惡意強梁加之然其𥘉來輕重未測先設方法說喻呪願種種釋之務令兩不相傷縱復刀杖恐愶使退必无殺害重増怨讎力設方術不能郤之分受毀壞以詶宿對不起報彼之心存道求後永免此爲智慧凡聦明而貧賤闇塞而富貴仁慈而短祚謟害而長年无罪而罹禍有舋而逸遊皆各報對毫分无差明通者了昧滯者疑疑不能遣遣不求非智慧也智慧者无疑无疑者有識識三十六天地明三十六妙行吟三十六真音群魔滅爽矣三尸極凶謂爲三毒毒害人命急宜除之守一精專三尸自滅一无形象无欲无爲求之難得守之易失失由識闇不能進明貪欲滯心致招衰老得喜失瞋致招疾病迷者不攺致招死殁殞瞋及老三尸所延治救保全唯先守一非一不濟非一不成守一恬惔夷心寂求損欲抑德反迷入正廓然无爲與一爲一此爲上上之人先身積極所致也中中以上先善未積積而未極皆由漸昇當存三元諦識神炁狀貌名字出入有无主鎮三宫三尸必落三元又妙非可即弘當懃行善五德備修萬善日積千魔敢干尸毒旣去練闇成明智慧神通長生不死聖真神仙隨因受果昇玄化世順運去來自測測人觀身觀物皆有證驗精詳察之有非即改悔有是即堅行齋静存思服佩藥符章表懴願疑實无虚无貪无欲不衰不老老反童嬰身神光澤无喜无嗔不病不厄厄度病除炁力强盛无迷无嫉不死不亡亡殁不殁正見无邪自通通人與道爲一一合一也號聖真仙欲不能寡衰不能攘嗔不能遣病不能差愚不能移死不能免空稱學道皆虚妄也虚妄之徒終䧟魔黨致使世境有詐稱假名或號太上或名聖真矯託神仙亂惑一切自非實學孰能正之化邪保正守一明三行五備六六通之人无有假僞動静皆真雖有權化終用真道真道之業不哀不病不死長生教訓不倦古今典籍過目即諳照其真僞了其抑揚明其漏誤洞其精麄治定解說朗然釋疑施經運用肅然有驗吐言无瑕出文无累清談動天敷文曜日落筆成章序讃玄極或經或傳或戒或律或偈或頌或劵或䟽或辭或牒或章或表或懴或願或訣或符或記或録或少或多或繁或簡或素或華或文或質或淺或深隨方設教行藏不同出没舛異隱顯之殊或先乖後㑹或前合後離離惡合善善爲道基發言着章有離有易有澁有利宛直各宜一通之人百字不治二通之人千言不攺三通之人萬字不玄四通之人十萬不易五通之人百萬不拘六通之人千萬不㸃自此以外應變无窮非斯六人不可製作乃得撰集効述古先皆應證引前聖謨誥慎勿率巳𦚾臆而言縱言巳心心未通逹不入正法皆謂邪文少時自滅不乆宣行唯彼六人流布无窮或隱或顯終不滅亡後學之儔精研此㫖覺未同六莫強著書徒勞心力人鬼所嗤得罪玄靈方罹重栲風刀痛惱歴劫无原勿尚虚名輕脫妄作妄作者凶明各加愼凡有益无益之爲有利无利之爲爲爲无爲爲爲非我我爲非我我爲爲物爲爲爲物有爲非爲非爲之爲爲无爲也爲无爲者怨謗不生生不傷巳彼自招災災加於彼痛之悲之念之祐之不快不縱不縱不快救之盡方方不能濟濟非彼堪此自常吉彼自䧟凶䧟凶非此此吉不求不求自至自至非凶自然是吉不知此吉非智慧人人嗔忿我我嗔忿之縱不報忿而不防閑坐彼罪深貽此禍重重禍㝷來來不覺知闇任爲通災延不測未能免之非智慧也自能能教人教人能益已益人益勿益益无益无曰損損僞益真真人教人不私在巳巳善善人人善同已巳人同善善練入真真道成就毀辱不來來不爲害判无所疑疑非智慧流言謗讟不反不覆方便解釋恱而不嗔彼我欣然疑誚雲散任性自是不顧祛他雖㑹中直未能兼弘偏羙有傷非智慧也非智慧者魔試日干无由得三十六芝无縁果三十六相不能生八十一好衆魔不可得消威神未得具足道場不可妄登登道消魔先定智慧矣青童稽首拜受奉行洞真太上說智慧消魔真經卷之四
