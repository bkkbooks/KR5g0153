front:
  text: 洞眞太上說智慧消魔眞經卷之二内二
  hash: sha256:a19fc14e31ff681f84d764682bdbd7ffc9d2dfc1e2f7e51f2c821083b618bb2f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0153_HFL_002-001a, image: hfl/1032/1032-038.png}
body:
  text: 入定品太上八術智慧滅魔神虎隱文得者入定生生无死上相青童撰合成章若有篤志宿命應見此文受之皆當齋戒賫金龍玉魚盟誓皆是天下萬精群靈之名千魔萬妖之隱諱也故撰之成文太一帝君常以鬼兵衛之慎勿輕傳太上大道君爰乃自彈景龍雲璈霄音千逸萬響纒激流徽鬱勃紫藹逥䕃玄風八發放是玉鳳延頸金鸞整炁龍吟碧波虎躍神州九嘯和唱玄鈞洞无伏獸攘袂猛馬張喉掲嶽横林御劔攝邪衆聲紛亂百狼玃妖爾乃命玉清上宫侍女安法嬰田四非趙定珠存雲門等合歌揮神之詩滅精散靈之曲其辭曰汎汎太霞轡八浮造雲營神宗理靈襟龍翰秀玉京金門纒蔚𥙿九房朗紫瓊髙駕渉北元蕭蕭入无生朱虎導靈師緑轅登上清四玄明朝禁抱華還鳳城七難尚梵緑擬摽九元衢宣曜寳太暉飈眇躍景敷整控啓素鄉河靈巳前驅隂雲帶夜日燭月欻交𥘉結朗未生神携領同反无萬源㵼北谷乘空歸流星滅景擢浮㳺峩峯自霄浪纒綿嘉樂宿妙微挺虚向逸宅丹玄本太空道亦暢幽明秉靈符闇推豈乖喪落玄表群㑹生始似乆夢德隱冲内迹至寂不覺當神精感太素煙映在所之玄響奏豪外幽條焉能疑恊晨鼓長扇暉霞生在兹絶洞溟溟流翔翅六領臺神王入玉虚至无侵朱兵九羅遘幽遼妙㑹亦巳平道藏金極章彈調赫栢榮千龍吐渌水九河倒竭傾洪藹攝絶宅靈浪四盖庭齊首𡺿𡼳宇莫檢形與名領㧞納元和秀縱玄執理含精灼雲房蕭倅清零紀靈道趣蘭闕玄玄即排起萬峯但竒觀雲上有瓊子終劫恊玉華靡覺方目始源神齊洞化淪伏忘定征河侯結上觀景珠瑋琳庭理元二虚表凝澄豈𧇊盈太陽交重隂逥拂存落冥同任六覺外靈唱齊一聲運璣璇漢道煥煥動華瓊萬神騰朱馬千魔无暇生妖滅水火宫眞躬寳太貞四命此阿理神定轡呼召地祇土精匿炁岀獄藏雲九源絶滅推校千精執馘雷震兆帝啓道四明奉轅摧爛萬邪勒割酆山九鬼共首千魔同身五帝秉鉞神公吐煙紫明竦觀朱炁累纒靈走夜臺精藏長綿毒獸萬尺所屠无親有何小妖聚百累千交炁齊瞻當人生門神虎縱威斬玃梟殘太无竒道至靈所甄子今受之永以佩身萬試不校千妖不干玉華詣房天真遊旋諷明靈音上朝三元歌畢於是太上大道君乃命左玄玉郎鬱梨玄執紫金羽節召太㣲天帝君太微天帝君凝化精炁操真䇿虚嘯咤萬神權羅本𥘉手執金眞淡盻太元忽聞命卒行登勑駕羽靈朱皇啓道輦甲天丁萬虎驅除金龍御兵玉節投景飛華入冥流燭煥陣行啓日精打碧鼔之滂浪叩瓊鍾之砰砰於是玄鈞合和廣樂遏後九鳳延頸而唱嘯百龍御津而同呴金精踊音八鸞翔舞紫旂建霄錦旄繞野緑盖列廕曲晨欻舉流鈴交擲月明徹響瓊玕表眞佪停五象香華散煙雰葩三景輕霄納暉薄霞帶光鳴轡七道八轝浮空虚輦九千衛以毒龍走雲赴玄聚炁攝風天明蓊潰八光朦朧眞女右騎左命靈童儵欻千億巳到上宫停駕玉清身超帝墉徊歩紫闕稽首待通旣至良乆太上大道君乃勑命侍晨四臣徐引以前登蘂珠之闥入七映内房太㣲天帝君稱名曰賤臣今到請聞大命矣太上大道君曰李山淵德合七聖爲金闕之主方當叅謁十天理命億兆定中元於玄機制隂陽以齊首㧞眞擢領封河召海斷任死生把執天威馘滅六天總罰三官羅執北帝明公侍軒道亦髙標德弘逸逺任亦重矣掌亦侔也我旣巳說之以智慧又復記之以消魔智慧可以驅神消魔可以滅邪復授之以神虎眞符使威馘六天詠之以揮神髙章亦助之散穢去患也且太微帝君所寳有金虎眞符以制天地神靈叱之以行便得摧斬千精佩之而徃則萬鬼滅形衆魔妄侵而即死群妖闚之而目冥乃可俱授山淵以成其任乎於是太微天帝君稽首唯唯乃解雲笈發瓊凾七光映素流曰啓眞九暉停曜飛香交纒執符未授顧命太微侍女紀林華嚴採雲朱條煙韓放要等合歌金眞之詩歩虚之曲其辭曰太冥絶四玄洞景寄神通玉臺敷朱霄緑霞有金墉上挹雲珠嶺仰投无刄峰靈鏡耀紫館藹沬暉冲空冥化纒玄琅挹節携紫童圎塗无凝幙綺藹復有重南排朱阜户西踰豪缺䆫體矯萬津波神生躡十方玄歸反寂轅上響乘天龍冥攄飛景輿揮鈴七道遊輕朗雲塵津欻巳造玉州左攝玉映妻右命金眞夫上接飛霄賢俯援靈妙疇彌纒廣寒宇披錦入神丘鳳腦固劫齡蘂醴反華頽太上宴夀稔制命萬杪階三覺承玄數縱歡煥牙迴飈粲停琅華紫桂何棲棲琳實鳴九霄玉節徴太㣲黄䇿遏德刄豈罕眞人暉弃素入无質百象始俱遺豁陽丹炁頴爛燦絳雲飛齊契玉映静炫懸上清畿神靈應冥數順感招兆世洪津浪紛蔚併景叅容裔峩峩金闕子蕭條入雲際俯仰萬兆變將順同精契玄棲絶寂臺清詠智與慧消魔滅萬鋒揮詩以逐穢金虎承天威摧神以匿氣掃妖千萬頃萬里无邪芥於焉大神割血百精喪目金虎奮豪吐威放毒收鬼无間横截刳腹六天共首神靈頓跼鳥獸藏音林草偃伏太元竒逸靈文朗郁佩之而進得以朝玉皇禮之於瓊寢衆眞詣其房有泄於神虎文禍及於九宗有漏於金虎眞符殃逮於七祖翁山淵藏之道德之英矣歌畢太微帝君乃授李君金虎眞符𧵥誓陳謝而各别去李君旣得奉受二符及聞太上說智慧消魔之二經並告上相青童使與上宰四輔撰集合成爲文令常施用以傳宿命當爲眞人者七百年中聽三授之此詩希㣲異音多是天地萬精群靈之名千魔毒妖之𨼆諱者也太上詠其名以顯其化以敘其事以盟其符矣神映八觀靈洞竒落威靈之祕符滅魔之妖作是神虎首其上標金虎班其次序智慧蔚乎文中消魔陳其字間矣若夜中恐畏但諷此二篇詩則千精迸匿如與萬人同宿山川聞此詩詠其神皆執鞭向聲䖏而拜敬也况佩神金以流煥六天何得不聚伏耶若有志道之士遊行五嶽欲昇仙騰超不得太微天帝及太一君諱名目金虎眞符則名不得上仙府也佩此符并諷誦滅魔之文則千精迸匿如與萬人同宿山川聞此詠其大神皆執鞭向聲䖏拜敬也若佩太㣲天帝諱及太一君字皆當賫盟信義請受師口訣不得經歴洿穢所謂八地𨼆術之祕妙也愼勿輕泄傳非其人殃流百世時不能受此恐有發泄封還名山洞真太上說智慧消魔真經卷之二
