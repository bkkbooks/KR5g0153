front:
  text: 洞真太上說智慧消魔真經卷之五
  hash: sha256:f5cf86eeb8794b2d5dbce5aafa531ae914bf9058bb55145cb69b82fcb5623ad9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0153_SJB_005-330613a, image: sjb/33/330613a.png}
body:
  text: 變化品太上告金闕帝君曰億兆有感感必有應惡是本有有而未極雖有㣲善善非妙善思惡惡應本有相趣也善是本无无而未有捨彼麄惡思此妙善妙善善應本无今起也本无是道道應唯善善有大小皆非惡也本有是俗俗應唯惡惡有大小皆非善也是以爲惡者道雖救之劇迷者不迴不迴遂墮惡非智慧所可如何也爲善者俗雖攻之堅正者不懷不懷遂成善是智慧所可營立也營立以一一生隂陽太和布炁含精養神神炁至妙无始无終无際无岸无頂无底无有中間无處无也有處皆有有不能知知者智慧无上之人也无上之人體此妙智而明守一施用不盈淵湛宗主迹應有分隨得多少故有巨細智慧焉何者智慧外名妙炁内實實自无離名有假合斂末歸本引僞還真真内无假應外有離離去復歸名有出入入爲心神出爲行業業有科法經教文言遵行布散施用依師始終无𧇊號曰功德功德成就由於五神肝魂肺魄脾志腎精心神相須了明无逆調和相順三一乃留留一統五六通在躬身神俱一入不二門心爲行主行歸心神神通无二抱一不離一无洞空空處无極无不容无不有内實无名外稱智慧也智慧者標源攝流智者知歸慧者不惑不惑入定應感无遺纎善必祐有功必輔有德必興有因必果果此入定變化適冝知定不定解法不修修之无驗窮不能通空言而无實事非智慧也智慧建德立功遵方用術謹宻精嚴存道依經從師取驗乆而無徴更増篤勵練習无休自然有成方術雖多要在少許耳第一存道守一一道一心心无二想淨行无洿服符勑呪數炁躡歩所修能專无不克驗驗成不乆皆由未精精又精之其中有信信決如左愼勿妄宣也智慧上士習此三術消却魔怨誅除鬼賊制伏惡人禳辟凶炁除憂救病保免兵戎水火不能侵衆災不能犯逍遥三界之外遊宴王毋之家代見太平之君名入種民之録神仙進昇皇階極級永與道合變化无窮是智慧之妙功衆聖之要訣矣金闕聖帝稽首奉行洞眞太上說智慧消魔真經卷之五
